apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io  # cleans up on delete

spec:
  project: infra

  source:
    repoURL: https://helm.releases.hashicorp.com
    chart: vault
    targetRevision: 0.34.0

    helm:
      values: |
        server:
          standalone:
            enabled: true

          dataStorage:
            enabled: true
            size: 5Gi
            
          ingress:
            enabled: true
            ingressClassName: traefik

            hosts:
              - host: vault.local
                paths:
                  - /

        ui:
          enabled: true

        injector:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: vault

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true