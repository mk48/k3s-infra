apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secret-store
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"  # after external-secrets CRDs are installed
  finalizers:
  - resources-finalizer.argocd.argoproj.io  # cleans up on delete

spec:
  project: default

  source:
    repoURL: https://github.com/mk48/k3s-infra
    targetRevision: main
    path: projects/platform/secret-store

  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
