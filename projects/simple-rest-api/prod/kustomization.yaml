apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: pi-prod

resources:
- ../common
- configmap.yaml
- externalsecret.yaml

patches:
- target:
    kind: Ingress
    name: hello-world-ingress
  patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: hello.local
- target:
    kind: Deployment
    name: hello-world
  patch: |-
    - op: add
      path: /spec/template/spec/containers/0/envFrom
      value:
        - configMapRef:
            name: hello-world-config
- target:
    kind: Deployment
    name: hello-world
  patch: |-
    - op: add
      path: /spec/template/spec/containers/0/envFrom/-
      value:
        secretRef:
          name: hello-world-secret

images:
- name: ghcr.io/mk48/simple-http
  newTag: "5"
